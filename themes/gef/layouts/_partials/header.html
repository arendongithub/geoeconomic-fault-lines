<div class="mx-auto flex max-w-5xl justify-between px-6 py-12">
  <div>
    <p class="text-2xl font-bold text-gray-900">&lt;{{ .Site.Title }}&gt;</p>
  </div>
  <div>
    {{ with resources.Get "images/umlogo.png" }}
    <img
      src="{{ .RelPermalink }}"
      alt="Maastricht University logo"
      class="hidden h-10 lg:block"
    />
    {{ end }}
  </div>
</div>
{{ partial "menu.html" . }}
